name: Incremental Scrape & Push

on:
  schedule:
    # Run at 2:00 AM UTC (4:00 AM local CEST) on Monday, Thursday, and Saturday
    - cron: "0 2 * * 1,4,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: [self-hosted, production]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          clean: false
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run incremental scraper
        run: ./scrape_and_push_current.sh
