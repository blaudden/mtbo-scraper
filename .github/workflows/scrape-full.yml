name: Full Scrape & Push

on:
  schedule:
    # Run at 0:00 AM UTC (2:00 AM local CEST) on Wednesday
    - cron: "0 0 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: [self-hosted, production]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          clean: false
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run full scraper
        run: ./scrape_and_push.sh
